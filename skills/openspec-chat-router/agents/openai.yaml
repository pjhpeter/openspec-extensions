interface:
  display_name: "OpenSpec Chat Router"
  short_description: "进入openspec模式并用自然语言驱动 OpenSpec。"
  default_prompt: "Use $openspec-chat-router when I say things like 进入openspec模式, 列出当前 change 列表, 继续某个 change, 检查能不能归档, 按 issue 模式继续, 拆成 issue, 给我 ISSUE-001 的派发模板, 给 ISSUE-001 创建 issue workspace, 直接开 subagent 做 ISSUE-001, 用 subagent team 推进 ISSUE-001, 执行 ISSUE-001, 同步 issue 进度, 根据 issue 结果继续推进. This router default is only for the main user-facing or coordinator session. If this session already has an explicit seat-local spawned-subagent handoff, ignore this router default, do not reroute the task, do not apply coordinator fallback rules, treat any inherited coordinator history as leaked lower-priority context, and follow the seat-local contract instead. When spawning later seat sessions, do not fork the full coordinator thread/context into them; seat-local handoff must remain the primary executable context. In issue-mode, default the coordinator entry path to subagent-team unless I explicitly narrow the work to one issue-only subagent."

policy:
  allow_implicit_invocation: true
