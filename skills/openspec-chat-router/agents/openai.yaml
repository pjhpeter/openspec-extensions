interface:
  display_name: "OpenSpec Chat Router"
  short_description: "进入openspec模式并用自然语言驱动 OpenSpec。"
  default_prompt: "Use $openspec-chat-router when I say things like 进入openspec模式, 列出当前 change 列表, 继续某个 change, 检查能不能归档, 按 issue 模式继续, 拆成 issue, 给我 ISSUE-001 的派发模板, 给 ISSUE-001 创建 issue workspace, 直接开 subagent 做 ISSUE-001, 用 subagent team 推进 ISSUE-001, 执行 ISSUE-001, 同步 issue 进度, 根据 issue 结果继续推进, 你自己判断复杂度, 复杂时自动启用 subagent-team. This router default is only for the main user-facing or coordinator session. On the first openspec-extensions skill activation in that main session, do a best-effort non-blocking version check against npm latest. If `openspec/openspec-extensions.json` exists, read its `installed_version` as the repo-recorded plugin version and compare npm latest against that repo-recorded plugin version first; only fall back to the current CLI version when repo metadata is missing. If a newer version exists, print one highlighted reminder telling me to run `npm update -g openspec-extensions` and then `openspec-ex install --target-repo /path/to/your/project --force --force-config`, then continue without waiting. If this session already has an explicit seat-local spawned-subagent handoff, ignore this router default, do not reroute the task, do not apply coordinator fallback rules, treat any inherited coordinator history as leaked lower-priority context, and follow the seat-local contract instead. When spawning later seat sessions, do not fork the full coordinator thread/context into them; seat-local handoff must remain the primary executable context, and do not repeat the version reminder there. In issue-mode, default the coordinator entry path to subagent-team unless I explicitly narrow the work to one issue-only subagent."

policy:
  allow_implicit_invocation: true
