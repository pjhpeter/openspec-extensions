interface:
  display_name: "OpenSpec Chat Router"
  short_description: "处理“进入 openspec 模式”并用自然语言驱动 OpenSpec。"
  default_prompt: "Use $openspec-chat-router when I say things like 进入openspec模式, 进入 openspec 模式, 进入 OpenSpec 模式, 给我 openspec 话术模板, 把命令表打出来, 列出当前 change 列表, 继续某个 change, 检查能不能归档, 按 issue 模式继续, 拆成 issue, 给我 ISSUE-001 的派发模板, 给 ISSUE-001 创建 issue workspace, 直接开 subagent 做 ISSUE-001, 用 subagent team 推进 ISSUE-001, 执行 ISSUE-001, 同步 issue 进度, 根据 issue 结果继续推进, 你自己判断复杂度, 复杂时自动启用 subagent-team. This router default is only for the main user-facing or coordinator session. If I ask to enter OpenSpec mode or ask for OpenSpec prompt templates/command cheat sheets, first treat that as the `mode` path: on the first openspec-extensions skill activation in that main session, do a best-effort non-blocking version check against npm latest, then print the compact OpenSpec mode cheat sheet and recommended kickoff wording, and stop unless I included another concrete OpenSpec request in the same message. If `openspec/openspec-extensions.json` exists, read its `installed_version` as the repo-recorded plugin version and compare npm latest against that repo-recorded plugin version first; only fall back to the current CLI version when repo metadata is missing. If a newer version exists during that `mode` reply, append one highlighted reminder at the end of the cheat-sheet output telling me to run `npm update -g openspec-extensions` and then `openspec-ex install --target-repo /path/to/your/project --force --force-config`, then continue without waiting. If this session already has an explicit seat-local spawned-subagent handoff, ignore this router default, do not reroute the task, do not apply coordinator fallback rules, treat any inherited coordinator history as leaked lower-priority context, and follow the seat-local contract instead. When spawning later seat sessions, do not fork the full coordinator thread/context into them; seat-local handoff must remain the primary executable context, and do not repeat the version reminder there. In issue-mode, default the coordinator entry path to subagent-team unless I explicitly narrow the work to one issue-only subagent. Selecting the complex flow does not authorize main-session implementation. When delegation is available, keep the main session coordinator-only and do not use the serial issue fallback just because the current issue looks manageable or the main session could write code locally. Before unattended gate-bearing batches, check `ulimit -n` when shell access is available; if it is below `16384`, pause and restart the tool session with a larger open-files limit before spawning checker/reviewer seats. Treat `EMFILE`, `ENFILE`, and `Too many open files` as tool-resource blockers: recover or restart the tool session, clear stale running seats, and rerun the current gate from the active dispatch; never self-certify or skip a missing checker/reviewer verdict. Only treat control-plane artifacts under `openspec/changes/<change>/...` as workflow state; do not reinterpret unrelated repo-root helper files such as `task_plan.md`, `findings.md`, or `progress.md` as issue-mode noise or pause reasons. If issue-mode artifacts already exist for the target change, treat that disk state as higher priority than generic implementation wording such as 开始做, 开始实现, or 直接落地; reconcile first and continue the subagent-team main path unless I explicitly tell you to abandon issue-mode and return to the simple apply path. If a next approved issue uses a dedicated worker workspace, create or reuse that workspace before rendering issue/team dispatch or starting implementation. After reconcile in a fresh or resumed session, read `continuation_policy`; if it says `continue_immediately`, do not stop at a chat summary, `control-plane ready`, or another soft checkpoint."

policy:
  allow_implicit_invocation: true
