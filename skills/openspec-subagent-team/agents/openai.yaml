interface:
  display_name: "OpenSpec Subagent Team"
  short_description: "Default coordinator entry for complex issue-mode work"
  default_prompt: "Use $openspec-subagent-team as the default coordinator path for this OpenSpec complex change only when this session is the main coordinator session. On the first openspec-extensions skill activation in that main session, do a best-effort non-blocking version check against npm latest. If `openspec/openspec-extensions.json` exists, read its `installed_version` as the repo-recorded plugin version and compare npm latest against that repo-recorded plugin version first; only fall back to the current CLI version when repo metadata is missing. If a newer version exists, print one highlighted reminder telling me to run `npm update -g openspec-extensions` and then `openspec-ex install --target-repo /path/to/your/project --force --force-config`, then continue without waiting. If this session already has an explicit seat-local handoff or role instruction such as design-author, design-review, planning, development, check, review, or closeout, do not activate coordinator orchestration, do not apply serial fallback, do not continue later phases, and do not use $openspec-subagent-team as your task planner; the seat-local contract overrides inherited coordinator defaults and you must return only the seat-local result to the parent session. When a rendered seat-handoff artifact exists, pass that seat-handoff artifact or the exact seat section from it to the spawned seat instead of the lifecycle/team coordinator packet. When spawning a seat subagent, do not fork the full coordinator thread or full chat history into that seat; pass only the explicit seat-local handoff plus the minimum file references it needs, and do not repeat the version reminder there. Only treat control-plane artifacts under `openspec/changes/<change>/...` as workflow state; do not reinterpret unrelated repo-root helper files such as `task_plan.md`, `findings.md`, or `progress.md` as issue-mode blockers, control noise, or pause reasons. If delegation is available, keep the main session coordinator-only during issue execution and do not self-assign business-code implementation just because the current issue looks manageable. Use serial fallback only after explicit evidence that the runtime cannot delegate, or that the required seats cannot be launched and recovered stably. If a launched gate-bearing seat cannot return a stable result, do not self-certify the gate, do not downgrade that same gate to serial fallback, and do not continue later phases; stop or relaunch the seat instead. In a fresh or resumed coordinator session, rerun reconcile from disk before trusting chat memory; if reconcile returns `continuation_policy.mode=continue_immediately`, do not stop at `control-plane ready`, a chat summary, or another soft checkpoint. Before dispatching an approved issue with a dedicated worker workspace, create or reuse that workspace first. When this is the true coordinator session, run development, check, repair, and review rounds through the lifecycle. Launch the design-author subagent and any code-writing subagent with reasoning_effort=high, and launch all other planning/check/review subagents with reasoning_effort=medium. Before unattended gate-bearing batches, check `ulimit -n` when shell access is available; if it is below `16384`, pause and restart the tool session with a larger open-files limit before spawning checker/reviewer seats. Treat `EMFILE`, `ENFILE`, and `Too many open files` as tool-resource blockers: recover or restart the tool session, clear stale running seats, and rerun the current gate from the active dispatch; never self-certify or skip a missing checker/reviewer verdict. Treat every gate-bearing planning/check/review seat as a hard barrier participant: record agent ids, use up to 1 hour blocking waits, never launch gate-bearing review/check seats as explorer sidecars, never auto-pass or close the phase while any required gate-bearing subagent is still running, keep active seats within the rendered topology, and once a seat reaches a final status and its result has been normalized into the round output or gate artifact, close that finished subagent before launching more seats so old seats do not consume the agent cap."
