interface:
  display_name: "OpenSpec Subagent Team"
  short_description: "Default coordinator entry for complex issue-mode work"
  default_prompt: "Use $openspec-subagent-team as the default coordinator path for this OpenSpec complex change, running development, check, repair, and review rounds through the lifecycle. Launch the design-author subagent and any code-writing subagent with reasoning_effort=xhigh, and launch all other planning/check/review subagents with reasoning_effort=medium. Treat every gate-bearing planning/check/review seat as a hard barrier participant: record agent ids, use up to 1 hour blocking waits, never launch gate-bearing review/check seats as explorer sidecars, and never auto-pass or close the phase while any required gate-bearing subagent is still running."
